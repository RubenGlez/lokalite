name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build release binaries
        run: swift build -c release

      - name: Create app bundle
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHORT_VERSION="${VERSION#v}"

          mkdir -p LokaliteApp.app/Contents/MacOS
          mkdir -p LokaliteApp.app/Contents/Resources
          cp .build/release/LokaliteApp LokaliteApp.app/Contents/MacOS/LokaliteApp
          cp assets/AppIcon.icns LokaliteApp.app/Contents/Resources/AppIcon.icns

          cat > LokaliteApp.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Lokalite</string>
            <key>CFBundleDisplayName</key>
            <string>Lokalite</string>
            <key>CFBundleExecutable</key>
            <string>LokaliteApp</string>
            <key>CFBundleIdentifier</key>
            <string>com.lokalite.app</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleVersion</key>
            <string>${SHORT_VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${SHORT_VERSION}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          printf 'APPL????' > LokaliteApp.app/Contents/PkgInfo

      - name: Ad-hoc sign app bundle
        run: codesign --force --deep --sign - LokaliteApp.app

      - name: Create DMG
        run: |
          brew install create-dmg
          VERSION="${GITHUB_REF_NAME}"
          create-dmg \
            --volname "Lokalite ${VERSION}" \
            --window-size 560 340 \
            --icon-size 96 \
            --icon "LokaliteApp.app" 140 160 \
            --app-drop-link 420 160 \
            --hide-extension "LokaliteApp.app" \
            "Lokalite-${VERSION}.dmg" \
            LokaliteApp.app

      - name: Create CLI PKG
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHORT_VERSION="${VERSION#v}"

          mkdir -p pkg-root/usr/local/bin
          cp .build/release/lokalite pkg-root/usr/local/bin/lokalite

          pkgbuild \
            --root pkg-root \
            --identifier com.lokalite.cli \
            --version "${SHORT_VERSION}" \
            --install-location / \
            "lokalite-cli-${VERSION}.pkg"

      - name: Create ZIP archives
        run: |
          VERSION="${GITHUB_REF_NAME}"
          zip -r "Lokalite-${VERSION}.zip" LokaliteApp.app
          zip -j "lokalite-cli-${VERSION}.zip" .build/release/lokalite

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          gh release create "${VERSION}" \
            --generate-notes \
            "Lokalite-${VERSION}.dmg" \
            "lokalite-cli-${VERSION}.pkg" \
            "Lokalite-${VERSION}.zip" \
            "lokalite-cli-${VERSION}.zip"

      - name: Update Homebrew formula and cask
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHORT_VERSION="${VERSION#v}"
          TARBALL_URL="https://github.com/RubenGlez/lokalite/archive/refs/tags/${VERSION}.tar.gz"
          DMG_URL="https://github.com/RubenGlez/lokalite/releases/download/${VERSION}/Lokalite-${VERSION}.dmg"

          FORMULA_SHA=$(curl -sL "${TARBALL_URL}" | shasum -a 256 | awk '{print $1}')
          CASK_SHA=$(curl -sL "${DMG_URL}" | shasum -a 256 | awk '{print $1}')

          sed -i '' "s|url \"https://github.com/RubenGlez/lokalite/archive/refs/tags/.*\"|url \"${TARBALL_URL}\"|" Formula/lokalite.rb
          sed -i '' "s|sha256 \"[a-f0-9]*\"|sha256 \"${FORMULA_SHA}\"|" Formula/lokalite.rb

          sed -i '' "s|version \".*\"|version \"${SHORT_VERSION}\"|" Casks/lokalite.rb
          sed -i '' "s|sha256 \"[a-f0-9]*\"|sha256 \"${CASK_SHA}\"|" Casks/lokalite.rb

          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add Formula/lokalite.rb Casks/lokalite.rb
          git commit -m "Update Homebrew formula and cask to ${VERSION}"
          git push
