name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write

    # Signing/notarization secrets are mapped to job env so steps can gate on
    # their presence (`if: env.X != ''`). When they are absent the workflow
    # falls back to the previous ad-hoc-signed, un-notarized artifacts — a
    # missing secret never hard-fails a release.
    # Internal job-env names are kept descriptive; the right-hand side maps them
    # to the account-wide signing secrets stored in the vault's Global project
    # and mirrored to this repo's Actions secrets. The Developer ID Installer
    # cert + secrets are set (2026-07-03), so the CLI pkg is productsigned +
    # notarized; a missing installer secret still falls back to an unsigned pkg.
    env:
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_SIGN_P12 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
      MACOS_INSTALLER_CERT_P12_BASE64: ${{ secrets.MACOS_SIGN_INSTALLER_P12 }}
      MACOS_INSTALLER_CERT_PASSWORD: ${{ secrets.MACOS_SIGN_INSTALLER_PASSWORD }}
      NOTARY_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_KEY }}
      NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
      NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Import Apple signing certificates
        if: env.MACOS_CERT_P12_BASE64 != ''
        run: |
          KEYCHAIN="${RUNNER_TEMP}/signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"

          security create-keychain -p "${KEYCHAIN_PW}" "${KEYCHAIN}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN}"
          security unlock-keychain -p "${KEYCHAIN_PW}" "${KEYCHAIN}"

          echo "${MACOS_CERT_P12_BASE64}" | base64 --decode > "${RUNNER_TEMP}/app.p12"
          security import "${RUNNER_TEMP}/app.p12" -k "${KEYCHAIN}" \
            -P "${MACOS_CERT_PASSWORD}" -T /usr/bin/codesign

          if [ -n "${MACOS_INSTALLER_CERT_P12_BASE64}" ]; then
            echo "${MACOS_INSTALLER_CERT_P12_BASE64}" | base64 --decode > "${RUNNER_TEMP}/installer.p12"
            security import "${RUNNER_TEMP}/installer.p12" -k "${KEYCHAIN}" \
              -P "${MACOS_INSTALLER_CERT_PASSWORD}" -T /usr/bin/productsign -T /usr/bin/pkgbuild
          fi

          # Allow codesign/productsign to use the keys without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PW}" "${KEYCHAIN}" >/dev/null
          # Prepend our keychain to the search list so the tools find the identities.
          security list-keychains -d user -s "${KEYCHAIN}" $(security list-keychains -d user | sed s/\"//g)

          APP_IDENTITY="$(security find-identity -v -p codesigning "${KEYCHAIN}" | grep 'Developer ID Application' | head -1 | awk '{print $2}')"
          INSTALLER_IDENTITY="$(security find-identity -v "${KEYCHAIN}" | grep 'Developer ID Installer' | head -1 | awk '{print $2}')"

          if [ -z "${APP_IDENTITY}" ]; then
            echo "No Developer ID Application identity found in the imported certificate." >&2
            exit 1
          fi

          echo "SIGN_KEYCHAIN=${KEYCHAIN}" >> "${GITHUB_ENV}"
          echo "APP_IDENTITY=${APP_IDENTITY}" >> "${GITHUB_ENV}"
          echo "INSTALLER_IDENTITY=${INSTALLER_IDENTITY}" >> "${GITHUB_ENV}"
          echo "SIGNING=1" >> "${GITHUB_ENV}"
          echo "Imported Developer ID Application identity ${APP_IDENTITY}."

      - name: Prepare notarization credentials
        if: env.MACOS_CERT_P12_BASE64 != '' && env.NOTARY_KEY_P8_BASE64 != ''
        run: |
          echo "${NOTARY_KEY_P8_BASE64}" | base64 --decode > "${RUNNER_TEMP}/notary.p8"
          echo "NOTARY_KEY_PATH=${RUNNER_TEMP}/notary.p8" >> "${GITHUB_ENV}"
          echo "NOTARIZE=1" >> "${GITHUB_ENV}"

      - name: Build release binaries
        run: |
          # CLI: plain SPM build
          swift build -c release --product lokalite
          # App: build with xcodebuild — its Bundle.module accessor resolves
          # resource bundles from Contents/Resources, unlike `swift build`,
          # whose accessor only checks the bundle root and the build path
          xcodebuild build -scheme LokaliteApp -configuration Release \
            -derivedDataPath .dd -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO

      - name: Sign CLI binary
        if: env.SIGNING == '1'
        run: |
          codesign --force --options runtime --timestamp \
            --sign "${APP_IDENTITY}" .build/release/lokalite
          codesign --verify --strict --verbose=2 .build/release/lokalite

      - name: Create app bundle
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHORT_VERSION="${VERSION#v}"
          APP_PRODUCTS=".dd/Build/Products/Release"

          mkdir -p LokaliteApp.app/Contents/MacOS
          mkdir -p LokaliteApp.app/Contents/Resources
          cp "${APP_PRODUCTS}/LokaliteApp" LokaliteApp.app/Contents/MacOS/LokaliteApp
          cp assets/AppIcon.icns LokaliteApp.app/Contents/Resources/AppIcon.icns
          # SPM resource bundles (Bundle.module) must ship inside the app,
          # otherwise resource lookups crash at runtime
          cp -R "${APP_PRODUCTS}"/*.bundle LokaliteApp.app/Contents/Resources/

          cat > LokaliteApp.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Lokalite</string>
            <key>CFBundleDisplayName</key>
            <string>Lokalite</string>
            <key>CFBundleExecutable</key>
            <string>LokaliteApp</string>
            <key>CFBundleIdentifier</key>
            <string>com.lokalite.app</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleVersion</key>
            <string>${SHORT_VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${SHORT_VERSION}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>SUFeedURL</key>
            <string>https://raw.githubusercontent.com/RubenGlez/lokalite/main/appcast.xml</string>
            <key>SUPublicEDKey</key>
            <string>C414ty+O4JN3PkkOQ8tMQeuwxE6Y+vSuCbuG2GOh/lA=</string>
          </dict>
          </plist>
          EOF

          printf 'APPL????' > LokaliteApp.app/Contents/PkgInfo

          # Embed Sparkle so the app can self-update (unconditional: without the
          # framework dyld can't resolve @rpath/Sparkle.framework and the app
          # would crash on launch). swift build populates .build/artifacts; the
          # xcframework slice is universal (arm64 + x86_64).
          SPARKLE_FW="$(find .dd/Build/Products -maxdepth 2 -name Sparkle.framework -type d 2>/dev/null | head -1)"
          if [ -z "${SPARKLE_FW}" ]; then
            SPARKLE_FW="$(find .build/artifacts -path '*macos-arm64_x86_64/Sparkle.framework' -type d 2>/dev/null | head -1)"
          fi
          if [ -z "${SPARKLE_FW}" ]; then
            echo "Sparkle.framework not found" >&2
            exit 1
          fi
          mkdir -p LokaliteApp.app/Contents/Frameworks
          ditto "${SPARKLE_FW}" LokaliteApp.app/Contents/Frameworks/Sparkle.framework
          # The executable's LC_RPATH points at build dirs / @loader_path; add the
          # bundle's Frameworks dir so @rpath/Sparkle.framework resolves at runtime.
          install_name_tool -add_rpath "@executable_path/../Frameworks" \
            LokaliteApp.app/Contents/MacOS/LokaliteApp 2>/dev/null || true

      - name: Sign app bundle (Developer ID)
        if: env.SIGNING == '1'
        run: |
          # Sign inside-out: nested resource bundles first, then the main
          # executable, then the bundle — all under the hardened runtime.
          for bundle in LokaliteApp.app/Contents/Resources/*.bundle; do
            [ -e "${bundle}" ] || continue
            codesign --force --options runtime --timestamp \
              --sign "${APP_IDENTITY}" "${bundle}"
          done
          # Sparkle's nested helpers must be signed before the framework, which
          # must be signed before the app (do not use --deep). Downloader.xpc
          # keeps its own sandbox entitlements.
          SPARKLE_V="LokaliteApp.app/Contents/Frameworks/Sparkle.framework/Versions/B"
          codesign --force --options runtime --timestamp \
            --sign "${APP_IDENTITY}" "${SPARKLE_V}/XPCServices/Installer.xpc"
          codesign --force --options runtime --timestamp --preserve-metadata=entitlements \
            --sign "${APP_IDENTITY}" "${SPARKLE_V}/XPCServices/Downloader.xpc"
          codesign --force --options runtime --timestamp \
            --sign "${APP_IDENTITY}" "${SPARKLE_V}/Autoupdate"
          codesign --force --options runtime --timestamp \
            --sign "${APP_IDENTITY}" "${SPARKLE_V}/Updater.app"
          codesign --force --options runtime --timestamp \
            --sign "${APP_IDENTITY}" "LokaliteApp.app/Contents/Frameworks/Sparkle.framework"
          codesign --force --options runtime --timestamp \
            --entitlements LokaliteApp.entitlements \
            --sign "${APP_IDENTITY}" LokaliteApp.app/Contents/MacOS/LokaliteApp
          codesign --force --options runtime --timestamp \
            --entitlements LokaliteApp.entitlements \
            --sign "${APP_IDENTITY}" LokaliteApp.app
          codesign --verify --strict --deep --verbose=2 LokaliteApp.app

      - name: Ad-hoc sign app bundle
        if: env.MACOS_CERT_P12_BASE64 == ''
        run: codesign --force --deep --sign - LokaliteApp.app

      - name: Notarize and staple app
        if: env.NOTARIZE == '1'
        run: |
          ditto -c -k --keepParent LokaliteApp.app "${RUNNER_TEMP}/LokaliteApp-notarize.zip"
          xcrun notarytool submit "${RUNNER_TEMP}/LokaliteApp-notarize.zip" \
            --key "${NOTARY_KEY_PATH}" --key-id "${NOTARY_KEY_ID}" \
            --issuer "${NOTARY_ISSUER_ID}" --wait
          xcrun stapler staple LokaliteApp.app

      - name: Create DMG
        run: |
          brew install create-dmg
          VERSION="${GITHUB_REF_NAME}"
          create-dmg \
            --volname "Lokalite ${VERSION}" \
            --window-size 560 340 \
            --icon-size 96 \
            --icon "LokaliteApp.app" 140 160 \
            --app-drop-link 420 160 \
            --hide-extension "LokaliteApp.app" \
            "Lokalite-${VERSION}.dmg" \
            LokaliteApp.app

      - name: Notarize and staple DMG
        if: env.NOTARIZE == '1'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          xcrun notarytool submit "Lokalite-${VERSION}.dmg" \
            --key "${NOTARY_KEY_PATH}" --key-id "${NOTARY_KEY_ID}" \
            --issuer "${NOTARY_ISSUER_ID}" --wait
          xcrun stapler staple "Lokalite-${VERSION}.dmg"

      - name: Create CLI PKG
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHORT_VERSION="${VERSION#v}"

          mkdir -p pkg-root/usr/local/bin
          cp .build/release/lokalite pkg-root/usr/local/bin/lokalite

          pkgbuild \
            --root pkg-root \
            --identifier com.lokalite.cli \
            --version "${SHORT_VERSION}" \
            --install-location / \
            "lokalite-cli-${VERSION}-unsigned.pkg"

          # Sign the installer with the Developer ID Installer identity when
          # available; otherwise ship the unsigned package as before.
          if [ "${SIGNING:-}" = "1" ] && [ -n "${INSTALLER_IDENTITY}" ]; then
            productsign --sign "${INSTALLER_IDENTITY}" \
              "lokalite-cli-${VERSION}-unsigned.pkg" "lokalite-cli-${VERSION}.pkg"
            rm -f "lokalite-cli-${VERSION}-unsigned.pkg"
          else
            mv "lokalite-cli-${VERSION}-unsigned.pkg" "lokalite-cli-${VERSION}.pkg"
          fi

      - name: Notarize and staple PKG
        if: env.NOTARIZE == '1' && env.INSTALLER_IDENTITY != ''
        run: |
          VERSION="${GITHUB_REF_NAME}"
          xcrun notarytool submit "lokalite-cli-${VERSION}.pkg" \
            --key "${NOTARY_KEY_PATH}" --key-id "${NOTARY_KEY_ID}" \
            --issuer "${NOTARY_ISSUER_ID}" --wait
          xcrun stapler staple "lokalite-cli-${VERSION}.pkg"

      - name: Create ZIP archives
        run: |
          VERSION="${GITHUB_REF_NAME}"
          zip -r "Lokalite-${VERSION}.zip" LokaliteApp.app
          zip -j "lokalite-cli-${VERSION}.zip" .build/release/lokalite

      - name: Generate checksums
        run: |
          VERSION="${GITHUB_REF_NAME}"
          shasum -a 256 \
            "Lokalite-${VERSION}.dmg" \
            "lokalite-cli-${VERSION}.pkg" \
            "Lokalite-${VERSION}.zip" \
            "lokalite-cli-${VERSION}.zip" > SHA256SUMS
          cat SHA256SUMS

      - name: Clean up signing keychain
        if: always() && env.SIGN_KEYCHAIN != ''
        run: security delete-keychain "${SIGN_KEYCHAIN}" || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          gh release create "${VERSION}" \
            --generate-notes \
            "Lokalite-${VERSION}.dmg" \
            "lokalite-cli-${VERSION}.pkg" \
            "Lokalite-${VERSION}.zip" \
            "lokalite-cli-${VERSION}.zip" \
            SHA256SUMS

      - name: Update Homebrew formula and cask
        env:
          GH_TOKEN: ${{ github.token }}
          HOMEBREW_PR_TOKEN: ${{ secrets.HOMEBREW_PR_TOKEN }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BRANCH="homebrew/${VERSION}"
          SHORT_VERSION="${VERSION#v}"
          TARBALL_URL="https://github.com/RubenGlez/lokalite/archive/refs/tags/${VERSION}.tar.gz"
          DMG_URL="https://github.com/RubenGlez/lokalite/releases/download/${VERSION}/Lokalite-${VERSION}.dmg"

          FORMULA_SHA=$(curl -sL --fail "${TARBALL_URL}" | shasum -a 256 | awk '{print $1}')
          EMPTY_SHA="e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
          if [ "${FORMULA_SHA}" = "${EMPTY_SHA}" ] || [ -z "${FORMULA_SHA}" ]; then
            echo "Failed to fetch valid Formula tarball SHA"
            exit 1
          fi

          CASK_SHA=""
          for i in 1 2 3 4 5; do
            SHA=$(curl -sL --fail "${DMG_URL}" | shasum -a 256 | awk '{print $1}')
            if [ "${#SHA}" -eq 64 ] && [ "${SHA}" != "${EMPTY_SHA}" ]; then
              CASK_SHA="${SHA}"
              break
            fi
            echo "DMG not ready yet, retrying in 15s (attempt $i/5)..."
            sleep 15
          done
          if [ -z "${CASK_SHA}" ] || [ "${CASK_SHA}" = "${EMPTY_SHA}" ]; then
            echo "Failed to fetch valid DMG SHA after 5 attempts"
            exit 1
          fi

          sed -i '' "s|url \"https://github.com/RubenGlez/lokalite/archive/refs/tags/.*\"|url \"${TARBALL_URL}\"|" Formula/lokalite.rb
          sed -i '' "s|sha256 \"[a-f0-9]*\"|sha256 \"${FORMULA_SHA}\"|" Formula/lokalite.rb

          sed -i '' "s|version \".*\"|version \"${SHORT_VERSION}\"|" Casks/lokalite-app.rb
          sed -i '' "s|sha256 \"[a-f0-9]*\"|sha256 \"${CASK_SHA}\"|" Casks/lokalite-app.rb

          # Sign the DMG and prepend a Sparkle appcast item so notarized users get
          # in-app auto-updates. The appcast on main is served verbatim over
          # raw.githubusercontent (SUFeedURL), so it updates when this PR merges —
          # same cadence as the cask. Skipped when the key is absent so releases
          # never hard-fail before the secret is configured.
          if [ -n "${SPARKLE_ED_PRIVATE_KEY}" ]; then
            SIGN_OUTPUT="$(printf '%s' "${SPARKLE_ED_PRIVATE_KEY}" | .build/artifacts/sparkle/Sparkle/bin/sign_update --ed-key-file - "Lokalite-${VERSION}.dmg")"
            ED_SIG="$(printf '%s' "${SIGN_OUTPUT}" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')"
            ED_LEN="$(printf '%s' "${SIGN_OUTPUT}" | sed -n 's/.*length="\([^"]*\)".*/\1/p')"
            if [ -z "${ED_SIG}" ] || [ -z "${ED_LEN}" ]; then
              echo "Failed to derive appcast signature from sign_update output: ${SIGN_OUTPUT}" >&2
              exit 1
            fi
            PUBDATE="$(date -u '+%a, %d %b %Y %H:%M:%S +0000')"
            cat > /tmp/appcast-item.xml << ITEM
          <item>
            <title>Lokalite ${SHORT_VERSION}</title>
            <link>https://github.com/RubenGlez/lokalite/releases/tag/${VERSION}</link>
            <sparkle:version>${SHORT_VERSION}</sparkle:version>
            <sparkle:shortVersionString>${SHORT_VERSION}</sparkle:shortVersionString>
            <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
            <pubDate>${PUBDATE}</pubDate>
            <enclosure url="${DMG_URL}" sparkle:edSignature="${ED_SIG}" length="${ED_LEN}" type="application/octet-stream" />
          </item>
          ITEM
            awk '/<!-- BEGIN ITEMS -->/{print; while((getline line < "/tmp/appcast-item.xml") > 0) print line; next} {print}' appcast.xml > appcast.xml.new
            mv appcast.xml.new appcast.xml
            APPCAST_CHANGED=1
          else
            echo "SPARKLE_ED_PRIVATE_KEY not set; skipping appcast update."
          fi

          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git checkout -B "${BRANCH}"
          git add Formula/lokalite.rb Casks/lokalite-app.rb
          COMMIT_MSG="Update Homebrew formula and cask to ${VERSION}"
          if [ "${APPCAST_CHANGED:-}" = "1" ]; then
            git add appcast.xml
            COMMIT_MSG="Update Homebrew formula, cask, and Sparkle appcast to ${VERSION}"
          fi
          git commit -m "${COMMIT_MSG}"
          git push -u origin "${BRANCH}"

          printf '%s\n' \
            "Update Homebrew formula and cask to ${VERSION}." \
            "" \
            "This release workflow refreshes:" \
            "- \`Formula/lokalite.rb\`" \
            "- \`Casks/lokalite-app.rb\`" \
            "- \`appcast.xml\` (Sparkle in-app update feed)" \
            "" \
            "The branch was created automatically from the release tag and is ready to merge into \`main\`." \
            > /tmp/homebrew-pr-body.md

          if [ -n "${HOMEBREW_PR_TOKEN}" ]; then
            PR_URL=$(GH_TOKEN="${HOMEBREW_PR_TOKEN}" gh pr list --repo RubenGlez/lokalite --head "${BRANCH}" --base main --state open --json url --jq '.[0].url // empty')
            if [ -z "${PR_URL}" ]; then
              PR_URL=$(GH_TOKEN="${HOMEBREW_PR_TOKEN}" gh pr create \
                --repo RubenGlez/lokalite \
                --base main \
                --head "${BRANCH}" \
                --title "${COMMIT_MSG}" \
                --body-file /tmp/homebrew-pr-body.md)
            fi

            echo "Homebrew PR: ${PR_URL}"

            # Merge automatically once the branch's build-and-test status passes,
            # so a release is fully hands-off. Best-effort: if repo auto-merge is
            # disabled the PR just stays open for a manual merge.
            if ! GH_TOKEN="${HOMEBREW_PR_TOKEN}" gh pr merge "${PR_URL}" --auto --squash; then
              echo "Could not enable auto-merge; merge the PR manually once checks pass."
            fi
          else
            echo "HOMEBREW_PR_TOKEN is not configured; skipping PR creation."
            echo "Open the branch manually if you want an automatic Homebrew PR:"
            echo "https://github.com/RubenGlez/lokalite/tree/${BRANCH}"
          fi
