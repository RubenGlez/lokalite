name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build release binaries
        run: swift build -c release

      - name: Create app bundle
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHORT_VERSION="${VERSION#v}"

          mkdir -p LokaliteApp.app/Contents/MacOS
          mkdir -p LokaliteApp.app/Contents/Resources
          cp .build/release/LokaliteApp LokaliteApp.app/Contents/MacOS/LokaliteApp
          cp assets/AppIcon.icns LokaliteApp.app/Contents/Resources/AppIcon.icns

          cat > LokaliteApp.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Lokalite</string>
            <key>CFBundleDisplayName</key>
            <string>Lokalite</string>
            <key>CFBundleExecutable</key>
            <string>LokaliteApp</string>
            <key>CFBundleIdentifier</key>
            <string>com.lokalite.app</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleVersion</key>
            <string>${SHORT_VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${SHORT_VERSION}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          printf 'APPL????' > LokaliteApp.app/Contents/PkgInfo

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME}"
          hdiutil create \
            -volname "Lokalite ${VERSION}" \
            -srcfolder LokaliteApp.app \
            -ov \
            -format UDZO \
            "Lokalite-${VERSION}.dmg"

      - name: Create CLI PKG
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHORT_VERSION="${VERSION#v}"

          mkdir -p pkg-root/usr/local/bin
          cp .build/release/lokalite pkg-root/usr/local/bin/lokalite

          pkgbuild \
            --root pkg-root \
            --identifier com.lokalite.cli \
            --version "${SHORT_VERSION}" \
            --install-location / \
            "lokalite-cli-${VERSION}.pkg"

      - name: Create ZIP archives
        run: |
          VERSION="${GITHUB_REF_NAME}"
          zip -r "Lokalite-${VERSION}.zip" LokaliteApp.app
          zip -j "lokalite-cli-${VERSION}.zip" .build/release/lokalite

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Lokalite-${{ github.ref_name }}.dmg
            lokalite-cli-${{ github.ref_name }}.pkg
            Lokalite-${{ github.ref_name }}.zip
            lokalite-cli-${{ github.ref_name }}.zip
