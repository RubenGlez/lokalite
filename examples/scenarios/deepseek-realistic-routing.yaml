id: deepseek_realistic_routing
agent: deepseek_realistic

# Realistic routing scenario: 5 available tools, minimal system prompt, natural phrasing.
# User describes a duplicate charge without explicitly asking for a refund.
# Based on MASSIVE-Agents / Ticket-Bench / HammerBench failure modes:
#   - wrong tool selected (check_payment_status, request_account_review)
#   - argument hallucination (reason: other vs duplicate_charge)
#   - no tool call (model responds with text only)

locales:
  en:
    input: "Hi, I checked my account and noticed the same charge was taken twice this month. That doesn't seem right."
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  fr:
    input: "Bonjour, j'ai vérifié mon compte et j'ai remarqué que le même montant a été prélevé deux fois ce mois-ci. Ça ne semble pas normal."
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  ar:
    input: "مرحباً، تحققت من حسابي ولاحظت أن نفس المبلغ قُطع مرتين هذا الشهر. هذا لا يبدو صحيحاً."
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  sw:
    input: "Habari, niliangalia akaunti yangu na kuona ada ile ile ilitolewa mara mbili mwezi huu. Hii haionekani kuwa sawa."
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  cy:
    input: "Helo, gwiriais fy nghyfrif a sylwi bod yr un tâl wedi ei gymryd ddwywaith y mis hwn. Nid yw hyn yn ymddangos yn iawn."
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  yo:
    input: "Ẹ káàárọ̀, mo ṣàyẹ̀wò àkọọ́lẹ̀ mi mo sì mọ̀ pé iye owó kan náà ti gba lẹ́ẹ̀mejì ní oṣù yìí. Èyí kò dára."
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  eu:
    input: "Kaixo, nire kontua egiaztatu dut eta hilabete honetan kobrantza bera bi aldiz kenduta dagoela ikusi dut. Hori ez dirudi zuzena."
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  mn:
    input: "Сайн байна уу, би дансаа шалгаад энэ сард нэг ижил дүн хоёр удаа хасагдсан байхыг олсон. Энэ зөв биш шиг санагдаж байна."
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human
