id: deepseek_lowresource_refund
agent: deepseek_support

# Stress-tests cross-locale tool-call consistency across a range of resource levels.
# Control: en (high-resource baseline)
# Medium: sw (Swahili), bn (Bengali), is (Icelandic)
# Low:    cy (Welsh), eu (Basque), mn (Mongolian), yo (Yoruba)

locales:
  en:
    input: "I was charged twice for my subscription. Can you refund one of the charges?"
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  sw:
    input: "Nilipiwa ada mara mbili kwa usajili wangu. Je, unaweza kunirudishia malipo moja?"
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  bn:
    input: "আমার সাবস্ক্রিপশনের জন্য আমাকে দুইবার চার্জ করা হয়েছে। আপনি কি একটি চার্জ ফেরত দিতে পারবেন?"
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  is:
    input: "Ég var rukkaður tvisvar fyrir áskriftina mína. Getur þú endurgreitt eina greiðslu?"
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  cy:
    input: "Codwyd tâl arnaf ddwywaith am fy nhanysgrifiad. Allwch chi roi ad-daliad i mi?"
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  eu:
    input: "Bi aldiz kobratua naiz harpidetzarengatik. Ordainketa bat itzul al dezakezu?"
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  mn:
    input: "Надаас захиалгын төлбөрийг хоёр удаа авсан. Нэг төлбөрийг буцааж өгөх боломжтой юу?"
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  yo:
    input: "Wọ́n gba owó mi fún ìforúkọsílẹ̀ mi lẹ́ẹ̀mejì. Ṣé o lè dá owó mi padà fún ọ̀kan?"
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human
