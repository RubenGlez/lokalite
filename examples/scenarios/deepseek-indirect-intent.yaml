id: deepseek_indirect_intent
agent: deepseek_support

# Tests intent extraction with indirect, colloquial phrasing across medium-resource languages.
# No locale explicitly asks for a refund — each describes the problem naturally.
# Based on MASSIVE-Agents and Ticket-Bench research: models fail when intent is implied, not stated.
# Expected failure mode: tool-call absence or argument hallucination (reason: other vs duplicate_charge).

locales:
  en:
    input: "I just looked at my bill and the same charge is showing up twice this month. That can't be right."
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  de:
    input: "Ich habe gerade meine Abrechnung geprüft und dieselbe Buchung erscheint zweimal in diesem Monat. Das stimmt doch nicht."
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  pt:
    input: "Olhei minha fatura agora e o mesmo valor aparece cobrado duas vezes este mês. Isso não deveria ter acontecido."
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  ar:
    input: "لاحظت للتو أن نفس المبلغ قد خُصم مرتين من حسابي هذا الشهر. هذا لا يبدو صحيحاً."
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  hi:
    input: "मैंने अभी अपना बिल देखा और उसमें यही चार्ज इस महीने दो बार दिख रहा है। यह सही नहीं लग रहा।"
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  tr:
    input: "Faturama baktım ve aynı ödeme bu ay iki kez görünüyor. Bu doğru olamaz."
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  ko:
    input: "방금 청구서를 확인했는데 이번 달에 같은 금액이 두 번 청구되어 있어요. 이게 맞는 건가요?"
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human

  nl:
    input: "Ik heb net mijn rekening bekeken en dezelfde kosten staan er twee keer op deze maand. Dat klopt toch niet?"
    expect:
      toolCall:
        name: create_refund_ticket
        arguments:
          reason: duplicate_charge
      noToolCall:
        name: escalate_to_human
